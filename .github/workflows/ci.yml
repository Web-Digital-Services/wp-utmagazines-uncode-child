name: CI

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  php-lint:
    name: PHP lint (php -l)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ["8.1", "8.2", "8.3"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}

      - name: Lint PHP files
        shell: bash
        run: |
          set -euo pipefail
          files=$(git ls-files '*.php' || true)
          if [ -z "$files" ]; then
            echo "No PHP files found."
            exit 0
          fi

          echo "$files" | while read -r f; do
            echo "Linting $f"
            php -l "$f"
          done

  theme-sanity:
    name: Theme sanity checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect theme directory
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          # Prefer repo-root theme layout (style.css at repo root).
          if [ -f "style.css" ]; then
            echo "theme_dir=." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Fallback: theme stored inside wp-content (WordPress-style).
          if [ -f "wp-content/themes/uncode-child/style.css" ]; then
            echo "theme_dir=wp-content/themes/uncode-child" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "ERROR: Could not find style.css at repo root or wp-content/themes/uncode-child/style.css"
          exit 1

      - name: Verify required files exist
        shell: bash
        run: |
          set -euo pipefail
          THEME_DIR="${{ steps.detect.outputs.theme_dir }}"

          test -f "${THEME_DIR}/style.css"
          test -f "${THEME_DIR}/functions.php" || echo "Note: functions.php not found (ok if theme doesn't use it)"
          test -f "${THEME_DIR}/rtl.css" || echo "Note: rtl.css not found (optional)"
          test -f "${THEME_DIR}/screenshot.png" || echo "Note: screenshot.png not found (optional)"

          echo "Theme sanity checks passed for: ${THEME_DIR}"

      - name: Confirm this is an Uncode child theme
        shell: bash
        run: |
          set -euo pipefail
          THEME_DIR="${{ steps.detect.outputs.theme_dir }}"

          if ! grep -qiE '^Template:\s*uncode\s*$' "${THEME_DIR}/style.css"; then
            echo "ERROR: ${THEME_DIR}/style.css does not contain 'Template: uncode' (expected for Uncode child theme)."
            echo "If this repo is not meant to be an Uncode child theme, remove this check."
            exit 1
          fi

          echo "Confirmed: Uncode child theme (Template: uncode)."