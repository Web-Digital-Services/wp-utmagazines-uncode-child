name: WP Engine Deploy

on:
  pull_request:
    types: [labeled, synchronize, reopened]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: write

env:
  DEFAULT_THEME_DIR: wp-content/themes/uncode-child
  STAGING_URL: https://stagemagazines.wpengine.com/mission

concurrency:
  group: wpengine-staging
  cancel-in-progress: true

jobs:
  cleanup_staging_label:
    name: Ensure only one PR has deploy:staging
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request' &&
      github.event.action == 'labeled' &&
      github.event.label.name == 'deploy:staging'
    steps:
      - name: Remove deploy:staging from other open PRs
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          CURRENT_PR: ${{ github.event.pull_request.number }}
          LABEL: deploy:staging
        run: |
          set -euo pipefail

          prs=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${OWNER}/${REPO}/pulls?state=open&per_page=100" \
            --jq ".[] | select(.labels[].name == \"${LABEL}\") | .number" || true)

          if [ -z "${prs}" ]; then
            echo "No other PRs with label '${LABEL}' found."
            exit 0
          fi

          for pr in ${prs}; do
            if [ "${pr}" != "${CURRENT_PR}" ]; then
              echo "Removing '${LABEL}' from PR #${pr}"
              gh api \
                -X DELETE \
                -H "Accept: application/vnd.github+json" \
                "/repos/${OWNER}/${REPO}/issues/${pr}/labels/${LABEL}" || true
            fi
          done

  deploy_staging:
    name: Deploy to WP Engine Staging (label-gated)
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request' &&
      (
        (github.event.action == 'labeled' && github.event.label.name == 'deploy:staging') ||
        (github.event.action != 'labeled' && contains(github.event.pull_request.labels.*.name, 'deploy:staging'))
      )

    steps:
      - name: Comment on PR (deploy starting)
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const marker = '<!-- wpengine-staging-deploy -->';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const stagingUrl = process.env.STAGING_URL;

            const body =
              `${marker}\n` +
              `🚀 **WP Engine Staging Deploy Started**\n\n` +
              `- **Run:** ${runUrl}\n` +
              `- **Staging URL:** ${stagingUrl}\n\n` +
              `I’ll update this comment when the deploy finishes.`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              per_page: 100,
            });

            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body,
              });
            }

      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Detect theme directory
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          if [ -f "style.css" ]; then
            echo "theme_dir=." >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -f "${DEFAULT_THEME_DIR}/style.css" ]; then
            echo "theme_dir=${DEFAULT_THEME_DIR}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "ERROR: Could not find style.css at repo root or ${DEFAULT_THEME_DIR}/style.css"
          exit 1

      - name: Configure SSH for WP Engine
        shell: bash
        env:
          WPE_SSH_PRIVATE_KEY: ${{ secrets.WPE_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "${WPE_SSH_PRIVATE_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H git.wpengine.com >> ~/.ssh/known_hosts

      - name: Deploy theme subtree to STAGING
        shell: bash
        env:
          WPE_STAGING_REMOTE: ${{ secrets.WPE_STAGING_REMOTE }}
          WPE_REMOTE_BRANCH: ${{ secrets.WPE_REMOTE_BRANCH }}
        run: |
          set -euo pipefail
          THEME_DIR="${{ steps.detect.outputs.theme_dir }}"

          git subtree split --prefix="${THEME_DIR}" -b wpengine-theme-split

          if git remote get-url wpengine_staging >/dev/null 2>&1; then
            git remote set-url wpengine_staging "${WPE_STAGING_REMOTE}"
          else
            git remote add wpengine_staging "${WPE_STAGING_REMOTE}"
          fi

          REMOTE_BRANCH="${WPE_REMOTE_BRANCH:-master}"
          echo "Pushing to staging remote branch: ${REMOTE_BRANCH}"
          git push wpengine_staging "wpengine-theme-split:${REMOTE_BRANCH}" --force

      - name: Comment on PR (deploy finished)
        if: always()
        uses: actions/github-script@v7
        env:
          JOB_STATUS: ${{ job.status }}
        with:
          script: |
            const pr = context.payload.pull_request;
            const marker = '<!-- wpengine-staging-deploy -->';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const stagingUrl = process.env.STAGING_URL;
            const status = process.env.JOB_STATUS;

            const icon = status === 'success' ? '✅' : (status === 'cancelled' ? '⚪' : '❌');
            const headline =
              status === 'success' ? '**WP Engine Staging Deploy Succeeded**' :
              status === 'cancelled' ? '**WP Engine Staging Deploy Cancelled**' :
              '**WP Engine Staging Deploy Failed**';

            const body =
              `${marker}\n` +
              `${icon} ${headline}\n\n` +
              `- **Run:** ${runUrl}\n` +
              `- **Staging URL:** ${stagingUrl}\n\n` +
              `Tip: hard refresh / incognito if you don’t see changes.`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              per_page: 100,
            });

            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body,
              });
            }

  deploy_prod:
    name: Deploy to WP Engine Production (main)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure SSH for WP Engine
        shell: bash
        env:
          WPE_SSH_PRIVATE_KEY: ${{ secrets.WPE_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "${WPE_SSH_PRIVATE_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H git.wpengine.com >> ~/.ssh/known_hosts

      - name: Deploy theme subtree to PROD
        shell: bash
        env:
          WPE_PROD_REMOTE: ${{ secrets.WPENGINE_PROD_REMOTE }}
          WPE_REMOTE_BRANCH: ${{ secrets.WPE_REMOTE_BRANCH }}
        run: |
          set -euo pipefail

          THEME_DIR="wp-content/themes/uncode-child"
          if [ -f "style.css" ]; then
            THEME_DIR="."
          fi

          git subtree split --prefix="${THEME_DIR}" -b wpengine-theme-split

          if git remote get-url wpengine_prod >/dev/null 2>&1; then
            git remote set-url wpengine_prod "${WPE_PROD_REMOTE}"
          else
            git remote add wpengine_prod "${WPE_PROD_REMOTE}"
          fi

          REMOTE_BRANCH="${WPE_REMOTE_BRANCH:-master}"
          echo "Pushing to prod remote branch: ${REMOTE_BRANCH}"
          git push wpengine_prod "wpengine-theme-split:${REMOTE_BRANCH}" --force